[project]
name = "editoris-melicorum"
version = "0.1.0a4"
description = "Editoris Melicorum is a digital music typesetting toolkit for music ministries in Catholic parishes. The toolkit helps build musical arrangements around traditional hymns in Gregorian notation."
authors = [{ name = "RJ Salvador", email = "salvador.workshop@gmail.com" }]
readme = "README.md"
requires-python = ">=3.13"
dependencies = []

[tool.poetry]
packages = [{include = "editorismelicorum", from = "src"}]
package-mode = false

[tool.poetry.scripts]
translate-voice = "src.editorismelicorum.translate_voice:translate_voice"
translate-solo = "src.editorismelicorum.translate_solo:translate_solo"
translate-accomp = "src.editorismelicorum.translate_accomp:translate_accomp"

[build-system]
requires = ["poetry-core>=2.0.0,<3.0.0"]
build-backend = "poetry.core.masonry.api"
